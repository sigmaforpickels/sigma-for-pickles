<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma for Pickles</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #1e293b, #0f172a);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
  font-weight: bold;
  font-size: 20px;
  background: rgba(255,255,255,0.05);
  box-shadow: 0 0 20px rgba(99,102,241,0.4);
}

/* CENTER */
.container {
  text-align: center;
  margin-top: 50px;
}

h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

/* SEARCH */
.search {
  margin: 20px auto;
  width: 60%;
  max-width: 500px;
  display: flex;
  box-shadow: 0 0 20px rgba(99,102,241,0.5);
  border-radius: 14px;
}

.search input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  border-radius: 14px 0 0 14px;
}

.search button {
  padding: 15px 20px;
  border: none;
  background: linear-gradient(135deg,#6366f1,#3b82f6);
  color: white;
  border-radius: 0 14px 14px 0;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  padding: 20px;
  border-radius: 18px;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 0 25px rgba(99,102,241,0.7);
}

.title {
  font-size: 18px;
  font-weight: bold;
}

.desc {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
  <div>⚡ Sigma for Pickles</div>
  <div id="time"></div>
</div>

<div class="container">
  <h1>Welcome</h1>

  <div class="search">
    <input id="searchBox" placeholder="Enter website..." />
    <button onclick="go()">Open</button>
  </div>
</div>

<div class="grid">

  <a class="card" href="#">
    <div class="title">App 1</div>
    <div class="desc">Your link</div>
  </a>

  <a class="card" href="#">
    <div class="title">App 2</div>
    <div class="desc">Your link</div>
  </a>

  <a class="card" href="#">
    <div class="title">App 3</div>
    <div class="desc">Your link</div>
  </a>

  <a class="card" href="#">
    <div class="title">App 4</div>
    <div class="desc">Your link</div>
  </a>

</div>

<script>
function go() {
  let url = document.getElementById("searchBox").value;
  if (!url.startsWith("http")) {
    url = "https://" + url;
  }
  window.open(url, "_blank");
}

function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString();
}

setInterval(updateTime, 1000);
</script>

</body>
</html>
