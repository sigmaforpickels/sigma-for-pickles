<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma for Pickles</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b,#312e81);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
  font-weight: bold;
}

/* CENTER */
.container {
  text-align: center;
  margin-top: 40px;
}

.search {
  margin: 20px auto;
  width: 60%;
  display: flex;
}

.search input {
  flex: 1;
  padding: 12px;
  border-radius: 10px 0 0 10px;
  border: none;
}

.search button {
  padding: 12px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 0 10px 10px 0;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap: 20px;
  padding: 20px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 12px;
  cursor: pointer;
  text-align: center;
  text-decoration: none;
  color: white;
}

.card:hover {
  background: rgba(255,255,255,0.2);
}

/* GAME PAGE */
#gamesPage {
  display: none;
  padding: 20px;
  text-align: center;
}
</style>
</head>

<body>

<!-- MAIN DASHBOARD -->
<div id="mainPage">

<div class="header">
  <div>Sigma for Pickles</div>
  <div id="time"></div>
</div>

<div class="container">
  <h1>Sigma for Pickles</h1>

  <div class="search">
    <input id="searchBox" placeholder="Enter website..." />
    <button onclick="go()">Open</button>
  </div>
</div>

<div class="grid">

  <!-- 📘 GN MATH -->
  <a class="card" href="https://www.gn-math.com" target="_blank">
    📘 GN Math
  </a>

  <!-- 🎮 GAME HUB -->
  <div class="card" onclick="showGames()">
    🎮 Games
  </div>

  <div class="card">App 3</div>
  <div class="card">App 4</div>

</div>

</div>

<!-- GAME HUB -->
<div id="gamesPage">

<h2>🎮 Game Hub</h2>

<button onclick="loadGame(1)">Click Game</button>
<button onclick="loadGame(2)">Guess Game</button>
<button onclick="loadGame(3)">Color Game</button>

<div id="gameContainer" style="margin-top:20px;"></div>

<br><br>
<button onclick="goBack()">⬅ Back</button>

</div>

<script>
// SEARCH
function go() {
  let url = document.getElementById("searchBox").value;
  if (!url.startsWith("http")) {
    url = "https://" + url;
  }
  window.open(url, "_blank");
}

// TIME
setInterval(() => {
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}, 1000);

// SWITCH PAGES
function showGames() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("gamesPage").style.display = "block";
}

function goBack() {
  document.getElementById("gamesPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  document.getElementById("gameContainer").innerHTML = "";
}

// GAMES
let score = 0;
let randomNum = Math.floor(Math.random() * 10) + 1;

function loadGame(game) {

  if (game === 1) {
    document.getElementById("gameContainer").innerHTML = `
      <h3>Click Game</h3>
      <button onclick="score++; document.getElementById('s').innerText=score">CLICK</button>
      <h2 id="s">0</h2>
    `;
  }

  if (game === 2) {
    document.getElementById("gameContainer").innerHTML = `
      <h3>Guess 1–10</h3>
      <input id="g">
      <button onclick="document.getElementById('r').innerText = (document.getElementById('g').value == ${randomNum}) ? 'Correct 🎉' : 'Try again'">Guess</button>
      <p id="r"></p>
    `;
  }

  if (game === 3) {
    document.getElementById("gameContainer").innerHTML = `
      <h3>Click Green</h3>
      <div onclick="this.style.background='green'" 
      style="width:100px;height:100px;background:red;margin:auto;"></div>
    `;
  }

}
</script>

</body>
</html>
