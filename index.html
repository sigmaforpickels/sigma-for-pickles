<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sigma for Pickles</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
    }

    .header {
      background-color: #1e293b;
      padding: 20px;
      cursor: pointer;
      position: relative;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .time {
      margin-top: 8px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .settings-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #334155;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .settings-btn:hover {
      background: #475569;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background-color: #1e293b;
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      border: none;
      font-size: 20px;
      font-weight: bold;
    }

    .card:hover {
      background-color: #334155;
    }

    .viewer {
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 12px;
      background: white;
      display: none;
    }

    .home-text {
      padding: 20px;
      color: #cbd5e1;
      font-size: 16px;
    }

    .settings-panel {
      display: none;
      position: fixed;
      top: 80px;
      right: 20px;
      width: 300px;
      background: #1e293b;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      z-index: 1000;
    }

    .settings-panel h3 {
      margin-top: 0;
      margin-bottom: 14px;
    }

    .settings-panel label {
      display: block;
      margin-top: 10px;
      margin-bottom: 6px;
      font-size: 14px;
      color: #cbd5e1;
    }

    .settings-panel input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .panel-buttons {
      margin-top: 10px;
    }

    .panel-buttons button {
      margin-right: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .close-btn {
      background: #475569;
      color: white;
    }
  </style>
</head>
<body>
  <div class="header" onclick="goHome()">
    <div class="title" id="siteTitle">Sigma for Pickles</div>
    <div class="time" id="time">Loading time...</div>
    <button class="settings-btn" onclick="toggleSettings(event)">⚙</button>
  </div>

  <div id="homeArea">
    <div class="grid">
      <button class="card" id="card1" onclick="openCard1()">GN Math</button>
      <button class="card" id="card2" onclick="openCard2()">UniUB v4</button>
    </div>

    <div class="home-text">
      Click "Sigma for Pickles" at the top anytime to go back home.
    </div>
  </div>

  <div class="viewer">
    <iframe id="siteFrame" allowfullscreen allow="fullscreen"></iframe>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <h3>Personalize</h3>

    <label for="titleInput">Site Title</label>
    <input id="titleInput" type="text">

    <label for="card1NameInput">First Button Name</label>
    <input id="card1NameInput" type="text">

    <label for="card1LinkInput">First Button Link</label>
    <input id="card1LinkInput" type="text">

    <label for="card2NameInput">Second Button Name</label>
    <input id="card2NameInput" type="text">

    <label for="card2LinkInput">Second Button Link</label>
    <input id="card2LinkInput" type="text">

    <div class="panel-buttons">
      <button class="save-btn" onclick="saveSettings()">Save</button>
      <button class="close-btn" onclick="closeSettings()">Close</button>
    </div>
  </div>

  <script>
    var card1Name = "GN Math";
    var card1Link = "https://gn-math.dev/";
    var card2Name = "UniUB v4";
    var card2Link = "https://5.thetravelingtourguide.com/#zones";
    var savedTitle = "Sigma for Pickles";

    function loadSavedSettings() {
      try {
        savedTitle = localStorage.getItem("siteTitle") || "Sigma for Pickles";
        card1Name = localStorage.getItem("card1Name") || "GN Math";
        card1Link = localStorage.getItem("card1Link") || "https://gn-math.dev/";
        card2Name = localStorage.getItem("card2Name") || "UniUB v4";
        card2Link = localStorage.getItem("card2Link") || "https://5.thetravelingtourguide.com/#zones";
      } catch (e) {
      }
    }

    function updateClock() {
      document.getElementById("time").textContent = new Date().toLocaleTimeString();
    }

    function renderCards() {
      document.getElementById("siteTitle").textContent = savedTitle;
      document.getElementById("card1").textContent = card1Name;
      document.getElementById("card2").textContent = card2Name;
    }

    function openSite(url) {
      document.getElementById("homeArea").style.display = "none";
      document.getElementById("siteFrame").style.display = "block";
      document.getElementById("siteFrame").src = url;
    }

    function openCard1() {
      openSite(card1Link);
    }

    function openCard2() {
      openSite(card2Link);
    }

    function goHome() {
      document.getElementById("siteFrame").src = "";
      document.getElementById("siteFrame").style.display = "none";
      document.getElementById("homeArea").style.display = "block";
      closeSettings();
    }

    function toggleSettings(event) {
      event.stopPropagation();
      var panel = document.getElementById("settingsPanel");

      document.getElementById("titleInput").value = savedTitle;
      document.getElementById("card1NameInput").value = card1Name;
      document.getElementById("card1LinkInput").value = card1Link;
      document.getElementById("card2NameInput").value = card2Name;
      document.getElementById("card2LinkInput").value = card2Link;

      if (panel.style.display === "block") {
        panel.style.display = "none";
      } else {
        panel.style.display = "block";
      }
    }

    function closeSettings() {
      document.getElementById("settingsPanel").style.display = "none";
    }

    function saveSettings() {
      savedTitle = document.getElementById("titleInput").value || "Sigma for Pickles";
      card1Name = document.getElementById("card1NameInput").value || "GN Math";
      card1Link = document.getElementById("card1LinkInput").value || "https://gn-math.dev/";
      card2Name = document.getElementById("card2NameInput").value || "UniUB v4";
      card2Link = document.getElementById("card2LinkInput").value || "https://5.thetravelingtourguide.com/#zones";

      try {
        localStorage.setItem("siteTitle", savedTitle);
        localStorage.setItem("card1Name", card1Name);
        localStorage.setItem("card1Link", card1Link);
        localStorage.setItem("card2Name", card2Name);
        localStorage.setItem("card2Link", card2Link);
      } catch (e) {
      }

      renderCards();
      closeSettings();
    }

    loadSavedSettings();
    renderCards();
    updateClock();
    setInterval(updateClock, 1000);
  </script>
</body>
</html>
