<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sigma for Pickles</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(15, 23, 42, 0.88);
      --panel-2: rgba(30, 41, 59, 0.96);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #22c55e;
      --danger: #ef4444;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 30%),
        radial-gradient(circle at top right, rgba(34, 197, 94, 0.18), transparent 25%),
        linear-gradient(160deg, #020617 0%, #0f172a 45%, #111827 100%);
    }

    .shell {
      width: min(1100px, calc(100% - 32px));
      margin: 24px auto;
      padding: 22px;
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 24px;
    }

    .brand h1 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.4rem);
      letter-spacing: 0.04em;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--muted);
    }

    .clock {
      min-width: 180px;
      padding: 14px 16px;
      border-radius: 18px;
      text-align: right;
      background: rgba(15, 23, 42, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .clock strong {
      display: block;
      font-size: 1.3rem;
    }

    .clock span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.4fr 0.9fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    .hero-card,
    .panel {
      padding: 20px;
      border-radius: 22px;
      background: var(--panel-2);
      border: 1px solid rgba(148, 163, 184, 0.12);
    }

    .hero-card h2,
    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.2rem;
    }

    .hero-card p,
    .panel p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.18);
      color: #dbeafe;
      font-size: 0.92rem;
    }

    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-left: 4px solid var(--accent);
      border-radius: 14px;
      background: rgba(34, 197, 94, 0.08);
      color: #dcfce7;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin: 28px 0 12px;
    }

    .section-head h2 {
      margin: 0;
    }

    .section-head span {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
    }

    .card,
    button,
    .back-button {
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }
