<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1"> 
    <title>Sigma for Pickles</title> 
    <style> 
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; overflow-x: hidden; } 
        .header { background: #1e293b; padding: 20px; position: relative; border-bottom: 2px solid #334155; } 
        .title { font-size: 28px; font-weight: bold; cursor: pointer; color: #38bdf8; } 
        .time { margin-top: 8px; color: #cbd5e1; font-size: 18px; } 
        .gear { position: absolute; top: 15px; right: 15px; width: 42px; height: 42px; border: none; border-radius: 12px; background: #334155; color: white; font-size: 22px; cursor: pointer; } 
        .gear:hover { background: #475569; } 
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; padding: 20px; } 
        .card { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 12px; padding: 20px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.2s; min-height: 80px; } 
        .card:hover { background: #334155; transform: translateY(-3px); border-color: #38bdf8; } 
        .settings { display: none; position: fixed; top: 75px; right: 20px; width: 320px; background: #1e293b; border-radius: 14px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 100; border: 1px solid #334155; max-height: 85vh; overflow-y: auto; } 
        .settings label { display: block; margin-bottom: 5px; color: #cbd5e1; font-size: 14px; } 
        .settings input { width: 100%; box-sizing: border-box; padding: 10px; border-radius: 8px; border: none; background: #0f172a; color: white; margin-bottom: 15px; } 
        .settings button { width: 100%; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-bottom: 8px; } 
        .launch-btn { background: #38bdf8; color: #0f172a; } 
        .music-btn { background: #10b981; color: white; } 
        .save-btn { background: #2563eb; color: white; } 
        .close-btn { background: #475569; color: white; } 
        .refresh-note { padding: 20px; color: #64748b; font-size: 13px; text-align: center; font-style: italic; } 
        #hidden-proxy-section { display: none; margin-top: 15px; border-top: 1px solid #334155; padding-top: 15px; } 
        .proxy-btn { background: #334155; color: #94a3b8; font-size: 13px; text-align: left; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; border: 1px solid transparent; } 
        .proxy-btn:hover { border-color: #38bdf8; color: white; } 
        
        /* Volume Slider Styling */
        .volume-container { margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; }
        .volume-slider { width: 100%; cursor: pointer; accent-color: #10b981; }
    </style> 
</head> 
<body> 

<div id="main-content"> 
    <div class="header"> 
        <div class="title" onclick="location.reload()">Sigma for Pickles</div> 
        <div class="time" id="time">00:00:00</div> 
        <button class="gear" id="gearBtn">⚙</button> 
    </div> 

    <div class="grid"> 
        <button class="card" onclick="cloak('https://gn-math.dev')">GN Math</button> 
        <button class="card" onclick="cloak('https://coolmathgames.com')">Cool Math Games</button> 
        <button class="card" onclick="cloak('https://mathstudy.xyz')">UniUB v4</button> 
        <button class="card" onclick="openIsolated('https://github.io')">n-gon</button> 
        <button class="card" onclick="cloak('https://wikilegia.org')">Utopia</button> 
        <button class="card" onclick="cloak('https://baseballbros.io')">Baseball Bros</button> 
    </div> 

    <div class="refresh-note"> 
        💡 If a game doesn't load, try <b>refreshing the page</b>. 
    </div> 
</div> 

<div class="settings" id="settingsBox"> 
    <h3>Settings</h3> 
    <label>Tab Name</label> 
    <input id="tab-name" type="text" placeholder="e.g. My Drive"> 
    
    <label>Icon URL</label> 
    <input id="tab-icon" type="text" placeholder="Icon URL"> 
    
    <button class="save-btn" onclick="saveSettings()">Save Tab Info</button> 
    
    <hr style="border: 0; border-top: 1px solid #334155; margin: 10px 0;"> 
    
    <label>Audio Controls</label>
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">▶ Play Music</button> 
    
    <div class="volume-container">
        <label>Volume</label>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
    </div>

    <button class="launch-btn" onclick="launchAboutBlank()">🚀 Launch About:Blank Tab</button> 
    
    <div id="hidden-proxy-section"> 
        <h4 style="color: #38bdf8; margin: 5px 0 10px 0;">Hidden Proxies</h4> 
        <div id="proxyList"></div> 
    </div> 
    
    <button class="close-btn" onclick="toggleSettings()" style="margin-top: 10px;">Close</button> 
</div> 

<!-- Hidden Audio Element -->
<audio id="bgMusic" loop>
    <source src="bg-music.mp3" type="audio/mpeg">
</audio>

<script> 
    const music = document.getElementById("bgMusic");
    const musicBtn = document.getElementById("musicBtn");
    const volumeSlider = document.getElementById("volumeSlider");

    // Toggle Music Function
    function toggleMusic() {
        if (music.paused) {
            music.play();
            musicBtn.innerHTML = "⏸ Pause Music";
        } else {
            music.pause();
            musicBtn.innerHTML = "▶ Play Music";
        }
    }

    // Volume Control Function
    volumeSlider.addEventListener("input", (e) => {
        music.volume = e.target.value;
    });

    const proxies = [ 
        { name: 'Vapor V4', url: 'https://fastly.net' }, 
        { name: "Jordan's Math", url: 'https://ham-tetra.es' }, 
        { name: 'Masha Learning', url: 'https://mashalearning.com' }, 
        { name: 'Daydream X', url: 'https://cloudflare.net' }, 
        { name: 'LuminalOS 1', url: 'https://graphicon.org' }, 
        { name: 'LuminalOS 2', url: 'https://goodfox.com.br' }, 
        { name: 'Rammerhead 1', url: 'https://wakemeup.ru' }, 
        { name: 'Rammerhead 2', url: 'https://fluxus.org' }, 
        { name: 'Rammerhead 3', url: 'https://primeflk.ch' } 
    ]; 

    const proxyList = document.getElementById('proxyList'); 
    proxies.forEach(p => { 
        const btn = document.createElement('button'); 
        btn.className = 'proxy-btn'; 
        btn.innerHTML = p.name; 
        btn.onclick = () => cloak(p.url); 
        proxyList.appendChild(btn); 
    }); 

    function openIsolated(targetUrl) { 
        const title = localStorage.getItem("cloakName") || "Sigma for Pickles"; 
        const icon = localStorage.getItem("cloakIcon") || ""; 
        const win = window.open('about:blank', '_blank'); 
        if (win) { 
            win.document.write(`<html><head><title>${title}</title><link rel="icon" href="${icon}"><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${targetUrl}" allowfullscreen referrerpolicy="no-referrer"></iframe></body></html>`); 
            win.document.close(); 
        } 
    } 

    function cloak(url) { 
        const title = localStorage.getItem("cloakName") || "Sigma for Pickles"; 
        const icon = localStorage.getItem("cloakIcon") || ""; 
        document.open(); 
        document.write(`<html><head><title>${title}</title><link rel="icon" href="${icon}"><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;background:#000;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${url}" allowfullscreen referrerpolicy="no-referrer"></iframe></body></html>`); 
        document.close(); 
    } 

    function launchAboutBlank() { 
        const url = window.location.href; 
        const title = localStorage.getItem("cloakName") || "Sigma for Pickles"; 
        const icon = localStorage.getItem("cloakIcon") || ""; 
        const win = window.open('about:blank', '_blank'); 
        if (win) { 
            win.document.write(`<html><head><title>${title}</title><link rel="icon" href="${icon}"><style>body,html{margin:0;padding:0;height:100%;overflow:hidden;}iframe{width:100%;height:100%;border:none;}</style></head><body><iframe src="${url}"></iframe></body></html>`); 
            win.document.close(); 
            window.location.replace("https://google.com"); 
        } 
    } 

    function saveSettings() { 
        localStorage.setItem("cloakName", document.getElementById("tab-name").value); 
        localStorage.setItem("cloakIcon", document.getElementById("tab-icon").value); 
        alert("Settings Saved!"); 
    } 

    function toggleSettings() { 
        const box = document.getElementById("settingsBox"); 
        box.style.display = (box.style.display === "block") ? "none" : "block"; 
    } 

    document.addEventListener('keydown', function(e) { 
        const box = document.getElementById("settingsBox"); 
        if (box.style.display === "block") { 
            if (e.shiftKey && e.ctrlKey && e.key.toLowerCase() === 'm') { 
                e.preventDefault(); 
                document.getElementById("hidden-proxy-section").style.display = "block"; 
            } 
        } 
    }); 

    document.getElementById("gearBtn").onclick = toggleSettings; 
    setInterval(() => { 
        document.getElementById("time").innerHTML = new Date().toLocaleTimeString(); 
    }, 1000); 
</script> 
</body> 
</html>
