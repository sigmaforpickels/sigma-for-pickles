<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sigma for Pickles</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #1e293b;
      padding: 20px;
      position: relative;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      display: inline-block;
    }

    .time {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .gear {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: #334155;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .gear:hover {
      background: #475569;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }

    .card:hover {
      background: #334155;
    }

    .viewer {
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 12px;
      background: white;
      display: none;
    }

    .home-text {
      padding: 20px;
      color: #cbd5e1;
    }

    .settings {
      display: none;
      position: fixed;
      top: 75px;
      right: 20px;
      width: 300px;
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      z-index: 999;
    }

    .settings h3 {
      margin-top: 0;
    }

    .settings p {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.4;
    }

    .settings label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .settings input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .settings button {
      margin-top: 8px;
      margin-right: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .close-btn {
      background: #475569;
      color: white;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title" id="homeTitle">Sigma for Pickles</div>
    <div class="time" id="time">Loading time...</div>
    <button class="gear" id="gearButton" type="button">⚙</button>
  </div>

  <div id="homeArea">
    <div class="grid">
      <button class="card" id="card1" type="button">GN Math</button>
      <button class="card" id="card2" type="button">UniUB v4</button>
      <button class="card" id="card3" type="button">Custom Link</button>
    </div>

    <div class="home-text">
      Click "Sigma for Pickles" at the top anytime to go back home.
    </div>
  </div>

  <div class="viewer">
    <iframe id="siteFrame" allowfullscreen></iframe>
  </div>

  <div class="settings" id="settingsBox">
    <h3>Settings</h3>
    <p>GN Math and UniUB v4 stay fixed. You can customize only the third card.</p>

    <label for="customNameInput">Custom Link Title</label>
    <input id="customNameInput" type="text" placeholder="Custom Link">

    <label for="customUrlInput">Custom Link URL</label>
    <input id="customUrlInput" type="text" placeholder="https://example.com">

    <button class="save-btn" id="saveButton" type="button">Save</button>
    <button class="close-btn" id="closeButton" type="button">Close</button>
  </div>

  <script>
    var fixedLink1 = "https://gn-math.dev/";
    var fixedLink2 = "https://5.thetravelingtourguide.com/#zones";

    var customName = localStorage.getItem("customName") || "Custom Link";
    var customUrl = localStorage.getItem("customUrl") || "";

    function updateClock() {
      document.getElementById("time").innerHTML = new Date().toLocaleTimeString();
    }

    function renderPage() {
      document.getElementById("card3").innerHTML = customName;
    }

    function openSite(url) {
      if (!url) {
        alert("Set your custom link first in Settings.");
        return;
      }

      document.getElementById("homeArea").style.display = "none";
      document.getElementById("siteFrame").style.display = "block";
      document.getElementById("siteFrame").src = url;
    }

    function goHome() {
      document.getElementById("siteFrame").src = "";
      document.getElementById("siteFrame").style.display = "none";
      document.getElementById("homeArea").style.display = "block";
      document.getElementById("settingsBox").style.display = "none";
    }

    function openSettings() {
      document.getElementById("customNameInput").value = customName;
      document.getElementById("customUrlInput").value = customUrl;
      document.getElementById("settingsBox").style.display = "block";
    }

    function closeSettings() {
      document.getElementById("settingsBox").style.display = "none";
    }

    function saveSettings() {
      customName = document.getElementById("customNameInput").value || "Custom Link";
      customUrl = document.getElementById("customUrlInput").value || "";

      localStorage.setItem("customName", customName);
      localStorage.setItem("customUrl", customUrl);

      renderPage();
      closeSettings();
    }

    document.getElementById("card1").onclick = function () {
      openSite(fixedLink1);
    };

    document.getElementById("card2").onclick = function () {
      openSite(fixedLink2);
    };

    document.getElementById("card3").onclick = function () {
      openSite(customUrl);
    };

    document.getElementById("homeTitle").onclick = function () {
      goHome();
    };

    document.getElementById("gearButton").onclick = function (event) {
      event.stopPropagation();
      openSettings();
    };

    document.getElementById("saveButton").onclick = function () {
      saveSettings();
    };

    document.getElementById("closeButton").onclick = function () {
      closeSettings();
    };

    updateClock();
    setInterval(updateClock, 1000);
    renderPage();
  </script>

</body>
</html>
