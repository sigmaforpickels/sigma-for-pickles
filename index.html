<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sigma for Pickles</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
    }

    .header {
      background-color: #1e293b;
      padding: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .time {
      margin-top: 8px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      display: block;
      background-color: #1e293b;
      color: white;
      text-decoration: none;
      padding: 20px;
      border-radius: 12px;
    }

    .card:hover {
      background-color: #334155;
    }

    .card-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-text {
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">Sigma for Pickles</div>
    <div class="time" id="time">Loading time...</div>
  </div>

  <div class="grid">
    <a class="card" href="https://www.gn-math.com" target="_blank">
      <div class="card-title">GN Math</div>
      <div class="card-text">Open GN Math quickly.</div>
    </a>
  </div>

  <script>
    function updateClock() {
      document.getElementById("time").innerHTML = new Date().toLocaleTimeString();
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
