<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sigma for Pickles</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: #0f172a; color: white; }
        .header { background: #1e293b; padding: 20px; position: relative; }
        .title { font-size: 28px; font-weight: bold; cursor: pointer; display: inline-block; }
        .time { margin-top: 8px; color: #cbd5e1; font-size: 18px; }
        .gear { position: absolute; top: 15px; right: 15px; width: 42px; height: 42px; border: none; border-radius: 12px; background: #334155; color: white; font-size: 22px; cursor: pointer; }
        .gear:hover { background: #475569; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e293b; color: white; border: none; border-radius: 12px; padding: 20px; font-size: 20px; font-weight: bold; cursor: pointer; text-align: center; }
        .card:hover { background: #334155; }
        .settings { display: none; position: fixed; top: 75px; right: 20px; width: 320px; background: #1e293b; border-radius: 14px; padding: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.4); z-index: 999; }
        .settings label { display: block; margin-top: 10px; margin-bottom: 5px; color: #cbd5e1; font-size: 14px; }
        .settings input { width: 100%; box-sizing: border-box; padding: 10px; border: none; border-radius: 8px; margin-bottom: 8px; background: #0f172a; color: white; }
        .settings button { margin-top: 8px; margin-right: 8px; padding: 10px 14px; border: none; border-radius: 8px; cursor: pointer; }
        .save-btn { background: #2563eb; color: white; }
        .close-btn { background: #475569; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title" onclick="location.reload()">Sigma for Pickles</div>
        <div class="time" id="time">Loading time...</div>
        <button class="gear" id="gearButton">⚙</button>
    </div>

    <div class="grid">
        <button class="card" onclick="openCloaked('https://gn-math.dev')">GN Math</button>
        <button class="card" onclick="openCloaked('https://thetravelingtourguide.com')">UniUB v4</button>
    </div>

    <div class="settings" id="settingsBox">
        <h3>Tab Mask Settings</h3>
        <label>Tab Title</label>
        <input id="mask-title" type="text" placeholder="e.g. My Drive">
        <label>Favicon URL</label>
        <input id="mask-icon" type="text" placeholder="https://google.com">
        <button class="save-btn" onclick="saveSettings()">Save</button>
        <button class="close-btn" onclick="document.getElementById('settingsBox').style.display='none'">Close</button>
    </div>

<script>
    function openCloaked(url) {
        const title = localStorage.getItem("maskTitle") || "New Tab";
        const icon = localStorage.getItem("maskIcon") || "";

        // This creates a "Virtual File" to open in the new tab
        const html = `
            <!DOCTYPE html>
            <html>
            <head>
                <title>${title}</title>
                <link rel="icon" href="${icon}">
                <style>
                    body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #000; }
                    iframe { width: 100%; height: 100%; border: none; }
                </style>
            </head>
            <body>
                <iframe src="${url}" allowfullscreen></iframe>
            </body>
            </html>
        `;

        const blob = new Blob([html], { type: 'text/html' });
        const blobUrl = URL.createObjectURL(blob);
        
        // Open the blob file instead of about:blank
        const newWin = window.open(blobUrl, '_blank');
        
        if (!newWin) {
            alert("❌ Pop-up blocked! Please allow pop-ups for this site in your browser settings.");
        }
    }

    function saveSettings() {
        localStorage.setItem("maskTitle", document.getElementById("mask-title").value);
        localStorage.setItem("maskIcon", document.getElementById("mask-icon").value);
        document.getElementById('settingsBox').style.display='none';
        alert("Settings Saved!");
    }

    document.getElementById("gearButton").onclick = () => {
        document.getElementById("mask-title").value = localStorage.getItem("maskTitle") || "";
        document.getElementById("mask-icon").value = localStorage.getItem("maskIcon") || "";
        document.getElementById("settingsBox").style.display = "block";
    };

    setInterval(() => {
        document.getElementById("time").innerHTML = new Date().toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
