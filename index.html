<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sigma for Pickles</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0f172a;
      color: white;
    }

    .header {
      background-color: #1e293b;
      padding: 20px;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .time {
      margin-top: 8px;
      font-size: 18px;
      color: #cbd5e1;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      display: block;
      background-color: #1e293b;
      color: white;
      text-decoration: none;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      cursor: pointer;
      border: none;
      font-size: 20px;
      font-weight: bold;
    }

    .card:hover {
      background-color: #334155;
    }

    .viewer {
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 12px;
      background: white;
    }

    .note {
      padding: 0 20px 20px 20px;
      color: #cbd5e1;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="title">Sigma for Pickles</div>
    <div class="time" id="time">Loading time...</div>
  </div>

  <div class="grid">
    <button class="card" onclick="openSite('https://gn-math.dev/')">GN Math</button>
    <button class="card" onclick="openSite('https://5.thetravelingtourguide.com/#zones')">Games</button>
  </div>

  <div class="viewer">
    <iframe id="siteFrame" src=""></iframe>
  </div>

  <div class="note">
    If a site stays blank inside the box, that site is blocking iframe embedding. In that case, it can only open as a normal page.
  </div>

  <script>
    function updateClock() {
      document.getElementById("time").innerHTML = new Date().toLocaleTimeString();
    }

    setInterval(updateClock, 1000);
    updateClock();

    function openSite(url) {
      document.getElementById("siteFrame").src = url;
    }
  </script>

</body>
</html>
