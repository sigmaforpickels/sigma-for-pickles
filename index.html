<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma for Pickles</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f172a,#1e293b,#312e81);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px 30px;
  font-size: 20px;
  font-weight: bold;
}

/* CENTER */
.container {
  text-align: center;
  margin-top: 40px;
}

h1 {
  font-size: 40px;
  margin-bottom: 10px;
}

/* SEARCH */
.search {
  margin: 20px auto;
  width: 60%;
  max-width: 500px;
  display: flex;
}

.search input {
  flex: 1;
  padding: 15px;
  border-radius: 12px 0 0 12px;
  border: none;
  outline: none;
}

.search button {
  padding: 15px 20px;
  border: none;
  background: #4f46e5;
  color: white;
  border-radius: 0 12px 12px 0;
  cursor: pointer;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
  gap: 20px;
  padding: 30px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.08);
  padding: 20px;
  border-radius: 16px;
  text-decoration: none;
  color: white;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.1);
}

.card:hover {
  transform: translateY(-5px);
  background: rgba(255,255,255,0.15);
}

.title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 5px;
}

.desc {
  font-size: 13px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
  <div>Sigma for Pickles</div>
  <div id="time"></div>
</div>

<div class="container">
  <h1>Sigma for Pickles</h1>

  <div class="search">
    <input id="searchBox" placeholder="Type a website..." />
    <button onclick="go()">Open</button>
  </div>
</div>

<div class="grid">

  <a class="card" href="#">
    <div class="title">App 1</div>
    <div class="desc">Add your link</div>
  </a>

  <a class="card" href="#">
    <div class="title">App 2</div>
    <div class="desc">Add your link</div>
  </a>

  <a class="card" href="#">
    <div class="title">App 3</div>
    <div class="desc">Add your link</div>
  </a>

  <a class="card" href="#">
    <div class="title">App 4</div>
    <div class="desc">Add your link</div>
  </a>

</div>

<script>
function go() {
  let url = document.getElementById("searchBox").value;
  if (!url.startsWith("http")) {
    url = "https://" + url;
  }
  window.open(url, "_blank");
}

function updateTime() {
  const now = new Date();
  document.getElementById("time").innerText =
    now.toLocaleTimeString();
}

setInterval(updateTime, 1000);
</script>

</body>
</html>
