<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma for Pickles</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 20px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  text-decoration: none;
  color: white;
}

.card:hover {
  background: #334155;
}

/* GAME PAGE */
#gamesPage {
  display: none;
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<!-- MAIN DASHBOARD -->
<div id="mainPage">

<div class="header">
  <div>Sigma for Pickles</div>
  <div id="time"></div>
</div>

<div class="grid">

  <!-- GN MATH -->
  <a class="card" href="https://www.gn-math.com" target="_blank">
    📘 GN Math
  </a>

  <!-- GAMES -->
  <div class="card" onclick="showGames()">
    🎮 Games
  </div>

</div>

</div>

<!-- GAME HUB -->
<div id="gamesPage">

<h2>🎮 Game Hub</h2>

<button onclick="loadGame(1)">Click Game</button>
<button onclick="loadGame(2)">Guess Game</button>
<button onclick="loadGame(3)">Color Game</button>

<div id="gameBox" style="margin-top:20px;"></div>

<br>
<button onclick="goBack()">⬅ Back</button>

</div>

<script>
// CLOCK
setInterval(() => {
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString();
}, 1000);

// SWITCH PAGES
function showGames() {
  document.getElementById("mainPage").style.display = "none";
  document.getElementById("gamesPage").style.display = "block";
}

function goBack() {
  document.getElementById("gamesPage").style.display = "none";
  document.getElementById("mainPage").style.display = "block";
  document.getElementById("gameBox").innerHTML = "";
}

// GAMES
let score = 0;
let num = Math.floor(Math.random()*10)+1;

function loadGame(x) {

  if (x === 1) {
    document.getElementById("gameBox").innerHTML =
      "<h3>Click Game</h3><button onclick='score++; document.getElementById(\"s\").innerText=score'>CLICK</button><h2 id='s'>0</h2>";
  }

  if (x === 2) {
    document.getElementById("gameBox").innerHTML =
      "<h3>Guess 1-10</h3><input id='g'><button onclick='document.getElementById(\"r\").innerText=(document.getElementById(\"g\").value=="+num+")?\"Correct 🎉\":\"Try again ❌\"'>Guess</button><p id='r'></p>";
  }

  if (x === 3) {
    document.getElementById("gameBox").innerHTML =
      "<h3>Click Green</h3><div onclick='this.style.background=\"green\"' style='width:100px;height:100px;background:red;margin:auto;'></div>";
  }

}
</script>

</body>
</html>
