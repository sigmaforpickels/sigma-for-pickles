<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sigma for Pickles</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .header {
      background: #1e293b;
      padding: 20px;
      position: relative;
      cursor: pointer;
    }

    .title {
      font-size: 28px;
      font-weight: bold;
    }

    .time {
      margin-top: 8px;
      color: #cbd5e1;
      font-size: 18px;
    }

    .gear {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 12px;
      background: #334155;
      color: white;
      font-size: 22px;
      cursor: pointer;
    }

    .gear:hover {
      background: #475569;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }

    .card:hover {
      background: #334155;
    }

    .viewer {
      padding: 20px;
    }

    iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 12px;
      background: white;
      display: none;
    }

    .home-text {
      padding: 20px;
      color: #cbd5e1;
    }

    .settings {
      display: none;
      position: fixed;
      top: 75px;
      right: 20px;
      width: 300px;
      background: #1e293b;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      z-index: 999;
    }

    .settings h3 {
      margin-top: 0;
    }

    .settings label {
      display: block;
      margin-top: 10px;
      margin-bottom: 5px;
      color: #cbd5e1;
      font-size: 14px;
    }

    .settings input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: none;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    .settings button {
      margin-top: 8px;
      margin-right: 8px;
      padding: 10px 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .save-btn {
      background: #2563eb;
      color: white;
    }

    .close-btn {
      background: #475569;
      color: white;
    }
  </style>
</head>
<body>

  <div class="header" id="homeButton">
    <div class="title" id="siteTitle">Sigma for Pickles</div>
    <div class="time" id="time">Loading time...</div>
    <button class="gear" id="gearButton" type="button">⚙</button>
  </div>

  <div id="homeArea">
    <div class="grid">
      <button class="card" id="card1" type="button">GN Math</button>
      <button class="card" id="card2" type="button">UniUB v4</button>
    </div>

    <div class="home-text">
      Click "Sigma for Pickles" at the top anytime to go back home.
    </div>
  </div>

  <div class="viewer">
    <iframe id="siteFrame" allowfullscreen></iframe>
  </div>

  <div class="settings" id="settingsBox">
    <h3>Personalize</h3>

    <label for="titleInput">Site Title</label>
    <input id="titleInput" type="text">

    <label for="name1Input">First Button Name</label>
    <input id="name1Input" type="text">

    <label for="link1Input">First Button Link</label>
    <input id="link1Input" type="text">

    <label for="name2Input">Second Button Name</label>
    <input id="name2Input" type="text">

    <label for="link2Input">Second Button Link</label>
    <input id="link2Input" type="text">

    <button class="save-btn" id="saveButton" type="button">Save</button>
    <button class="close-btn" id="closeButton" type="button">Close</button>
  </div>

  <script>
    var siteTitle = "Sigma for Pickles";
    var card1Name = "GN Math";
    var card1Link = "https://gn-math.dev/";
    var card2Name = "UniUB v4";
    var card2Link = "https://5.thetravelingtourguide.com/#zones";

    function updateClock() {
      document.getElementById("time").innerHTML = new Date().toLocaleTimeString();
    }

    function renderPage() {
      document.getElementById("siteTitle").innerHTML = siteTitle;
      document.getElementById("card1").innerHTML = card1Name;
      document.getElementById("card2").innerHTML = card2Name;
    }

    function openSite(url) {
      document.getElementById("homeArea").style.display = "none";
      document.getElementById("siteFrame").style.display = "block";
      document.getElementById("siteFrame").src = url;
    }

    function goHome() {
      document.getElementById("siteFrame").src = "";
      document.getElementById("siteFrame").style.display = "none";
      document.getElementById("homeArea").style.display = "block";
      document.getElementById("settingsBox").style.display = "none";
    }

    function openSettings() {
      document.getElementById("titleInput").value = siteTitle;
      document.getElementById("name1Input").value = card1Name;
      document.getElementById("link1Input").value = card1Link;
      document.getElementById("name2Input").value = card2Name;
      document.getElementById("link2Input").value = card2Link;
      document.getElementById("settingsBox").style.display = "block";
    }

    function closeSettings() {
      document.getElementById("settingsBox").style.display = "none";
    }

    function saveSettings() {
      siteTitle = document.getElementById("titleInput").value || "Sigma for Pickles";
      card1Name = document.getElementById("name1Input").value || "GN Math";
      card1Link = document.getElementById("link1Input").value || "https://gn-math.dev/";
      card2Name = document.getElementById("name2Input").value || "UniUB v4";
      card2Link = document.getElementById("link2Input").value || "https://5.thetravelingtourguide.com/#zones";

      renderPage();
      closeSettings();
    }

    document.getElementById("card1").onclick = function () {
      openSite(card1Link);
    };

    document.getElementById("card2").onclick = function () {
      openSite(card2Link);
    };

    document.getElementById("homeButton").onclick = function () {
      goHome();
    };

    document.getElementById("gearButton").onclick = function (event) {
      event.stopPropagation();
      openSettings();
    };

    document.getElementById("saveButton").onclick = function () {
      saveSettings();
    };

    document.getElementById("closeButton").onclick = function () {
      closeSettings();
    };

    updateClock();
    setInterval(updateClock, 1000);
    renderPage();
  </script>

</body>
</html>
